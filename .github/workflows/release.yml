name: GitHub Release

on:
  workflow_call:
    inputs:
      prerelease:
        required: true
        type: boolean

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Release Notes
        id: extract_notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          VERSION="${VERSION%-pre-release}"
          VERSION="${VERSION%-preview}"
          echo "Extracting notes for version: $VERSION"
          
          # Use awk to extract the section
          # It looks for '### [VERSION]' and prints until the next '### ' or EOF
          awk -v ver="[$VERSION]" '/### / { if (p) { exit }; if ($2 == ver) { p=1; next } } p { print }' CHANGELOG.md > release_notes.md
          
          # Check if we actually extracted something
          if [ ! -s release_notes.md ]; then
            echo "No release notes found in CHANGELOG.md for version $VERSION"
            echo "notes=" >> $GITHUB_OUTPUT
          else
            # We need to escape multiline output for GITHUB_OUTPUT
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            cat release_notes.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: compiled-binaries

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets
          cp compiled-binaries/lsp-server-linux-x64/lsp-server-linux-x64 release-assets/
          cp compiled-binaries/lsp-server-win-x64.exe/lsp-server-win-x64.exe release-assets/
          cp compiled-binaries/lsp-server-macos-x64/lsp-server-macos-x64 release-assets/
          cp compiled-binaries/lsp-server-macos-arm64/lsp-server-macos-arm64 release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body: ${{ steps.extract_notes.outputs.notes }}
          generate_release_notes: ${{ steps.extract_notes.outputs.notes == '' }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
