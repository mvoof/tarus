name: Rust CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'lsp-server/**/*.rs'
      - 'lsp-server/Cargo.toml'
      - 'lsp-server/Cargo.lock'
  workflow_dispatch:

jobs:
  rust-ci:
    name: Cargo Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: lsp-server

      - name: Cargo Check
        run: cargo check --manifest-path lsp-server/Cargo.toml

      - name: Cargo Clippy
        run: cargo clippy --manifest-path lsp-server/Cargo.toml -- -D warnings
